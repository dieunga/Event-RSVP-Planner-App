version: '3.8'

services:
  # ── Infrastructure ──
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: admin123
      MYSQL_DATABASE: webdb
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  # ── Microservices ──
  auth-service:
    build: ./services/auth-service
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DB_HOST: mysql
      DB_USER: admin
      DB_PASS: admin123
      DB_NAME: webdb
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:9092
    depends_on:
      - mysql
      - redis
      - kafka

  event-service:
    build: ./services/event-service
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      DB_HOST: mysql
      DB_USER: admin
      DB_PASS: admin123
      DB_NAME: webdb
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:9092
      AUTH_SERVICE_URL: http://auth-service:3001
    depends_on:
      - mysql
      - redis
      - kafka
      - auth-service

  rsvp-service:
    build: ./services/rsvp-service
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      DB_HOST: mysql
      DB_USER: admin
      DB_PASS: admin123
      DB_NAME: webdb
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:9092
      AUTH_SERVICE_URL: http://auth-service:3001
    depends_on:
      - mysql
      - redis
      - kafka
      - auth-service

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - auth-service
      - event-service
      - rsvp-service

volumes:
  mysql_data:
