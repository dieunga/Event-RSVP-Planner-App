# Istio PeerAuthentication - enforce mTLS between services
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default
  namespace: soiree
spec:
  mtls:
    mode: STRICT
---
# Istio AuthorizationPolicy - allow traffic between services
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-intra-namespace
  namespace: soiree
spec:
  action: ALLOW
  rules:
    - from:
        - source:
            namespaces: ["soiree", "istio-system"]
    - from:
        - source:
            namespaces: ["istio-system"]
