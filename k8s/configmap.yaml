apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: soiree
data:
  DB_HOST: "database-1.xxxxx.ap-southeast-1.rds.amazonaws.com"  # Replace with actual RDS endpoint
  DB_NAME: "webdb"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  KAFKA_BROKERS: "kafka-service:9092"
  AUTH_SERVICE_URL: "http://auth-service:3001"
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: soiree
type: Opaque
stringData:
  DB_USER: "admin"
  DB_PASS: "admin123"    # Replace with actual password in production
